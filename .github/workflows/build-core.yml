name: Build sing-box core

on:
  workflow_dispatch:
    inputs:
      sing_box_version:
        description: sing-box tag to build
        required: true
        default: v1.13.11
      publish_update:
        description: publish artifact to update branch
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-core.yml

permissions:
  contents: write

env:
  SING_BOX_REPO: https://github.com/SagerNet/sing-box.git
  BUILD_TAGS: with_quic,with_utls,with_clash_api,badlinkname,tfogo_checklinkname0
  GO_VERSION: "1.24.x"

jobs:
  smoke-amd64:
    name: Compile smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Set build version
        run: echo "SING_BOX_VERSION=${{ github.event.inputs.sing_box_version || 'v1.13.11' }}" >> "$GITHUB_ENV"

      - name: Checkout sing-box
        run: git clone --depth 1 --branch "$SING_BOX_VERSION" "$SING_BOX_REPO" sing-box

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: sing-box/go.sum

      - name: Build host binary
        working-directory: sing-box
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -v -trimpath \
              -tags "$BUILD_TAGS" \
              -ldflags "-s -w -buildid=" \
              -o ../sing-box-smoke \
              ./cmd/sing-box

      - name: Smoke test
        run: |
          ./sing-box-smoke version
          ./sing-box-smoke version | grep -F "with_clash_api"

  build-openwrt-arm64:
    name: Build OpenWrt aarch64_cortex-a53
    runs-on: ubuntu-latest
    needs: smoke-amd64
    env:
      TARGET_NAME: openwrt-aarch64_cortex-a53
      GOARCH: arm64
      GOARM64: v8.0
    steps:
      - name: Set build version
        run: |
          version="${{ github.event.inputs.sing_box_version || 'v1.13.11' }}"
          echo "SING_BOX_VERSION=$version" >> "$GITHUB_ENV"
          echo "PLAIN_VERSION=${version#v}" >> "$GITHUB_ENV"

      - name: Checkout sing-box
        run: git clone --depth 1 --branch "$SING_BOX_VERSION" "$SING_BOX_REPO" sing-box

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: sing-box/go.sum

      - name: Build target binary
        working-directory: sing-box
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH="$GOARCH" GOARM64="$GOARM64" \
            go build -v -trimpath \
              -tags "$BUILD_TAGS" \
              -ldflags "-s -w -buildid=" \
              -o ../sing-box \
              ./cmd/sing-box

      - name: Package
        run: |
          asset="sing-box-${PLAIN_VERSION}-${TARGET_NAME}"
          mkdir -p "package/${asset}"
          mv sing-box "package/${asset}/sing-box"
          chmod 755 "package/${asset}/sing-box"
          tar -C package -czf "${asset}.tar.gz" "$asset"
          sha256sum "${asset}.tar.gz" > "${asset}.tar.gz.sha256"
          ls -lh "${asset}.tar.gz" "${asset}.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-${{ env.PLAIN_VERSION }}-${{ env.TARGET_NAME }}
          path: |
            sing-box-${{ env.PLAIN_VERSION }}-${{ env.TARGET_NAME }}.tar.gz
            sing-box-${{ env.PLAIN_VERSION }}-${{ env.TARGET_NAME }}.tar.gz.sha256

      - name: Publish to update branch
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish_update == 'true' }}
        run: |
          asset="sing-box-${PLAIN_VERSION}-${TARGET_NAME}"
          work="$(mktemp -d)"
          git clone --depth 1 --branch update "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$work"
          mkdir -p "$work/bin/sing-box"
          cp "${asset}.tar.gz" "${asset}.tar.gz.sha256" "$work/bin/sing-box/"
          cd "$work"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bin/sing-box
          git commit -m "Add ${asset} core asset" || exit 0
          git push origin update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
